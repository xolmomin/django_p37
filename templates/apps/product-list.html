<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product List</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .inactive {
            color: #999;
        }

        .add-btn {
            display: inline-block;
            margin: 20px auto;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        .add-btn:hover {
            background-color: #45a049;
        }

        .header {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Product List</h1>
    <a href="{% url 'product_add_page' %}" class="add-btn">Add Product</a>
</div>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Price</th>
        <th>Description</th>
        <th>Category</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    {% for product in products %}
        <tr class="{% if not product.category.is_active %}inactive{% endif %}">
            <td>{{ product.name }}</td>
            <td>{{ product.price }} $</td>
            <td>{{ product.description }}</td>
            <td>{{ product.category.name }}</td>
            <td>
                <a href="{% url 'product_detail_page' product.pk %}">
                    <button>Edit / View</button>
                </a>
            </td>
        </tr>
    {% empty %}
        <tr>
            <td colspan="5" style="text-align:center;">No products found.</td>
        </tr>
    {% endfor %}
    </tbody>
</table>

</body>
</html>
